<div class="modal-header">
  <h5 class="modal-title">{{ isEditMode() ? 'Editar cita' : 'Nueva cita' }}</h5>
  <button type="button" class="btn-close" aria-label="Close" (click)="cancelar()"></button>
</div>

<div class="modal-body">
  <div class="mb-3">
    <label class="form-label" for="modal_titulo">Titulo</label>
    <input id="modal_titulo" type="text" class="form-control" [(ngModel)]="titulo" />
  </div>

  <div class="mb-3">
    <label class="form-label" for="modal_descripcion">Descripcion</label>
    <textarea id="modal_descripcion" class="form-control" rows="2" [(ngModel)]="descripcion"></textarea>
  </div>

  <div class="row">
    <div class="col-md-6 mb-3">
      <label class="form-label" for="modal_inicio">Inicio</label>
      <input id="modal_inicio" type="datetime-local" class="form-control" [(ngModel)]="inicioLocal" />
    </div>
    <div class="col-md-6 mb-3">
      <label class="form-label" for="modal_fin">Fin</label>
      <input id="modal_fin" type="datetime-local" class="form-control" [(ngModel)]="finLocal" />
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">Cliente</label>
    <div class="input-group mb-2">
      <input type="text" class="form-control" placeholder="Buscar cliente" [(ngModel)]="clienteSearch" (keyup.enter)="buscarClientes()" />
      <button type="button" class="btn btn-outline-primary" (click)="buscarClientes()">Buscar</button>
    </div>
    <select class="form-control" [(ngModel)]="clienteId">
      <option [ngValue]="null">Seleccione un cliente</option>
      @for (cliente of clientes; track cliente.id) {
        <option [ngValue]="cliente.id">{{ cliente.nombres }} {{ cliente.apellidos }} - {{ cliente.dni }}</option>
      }
    </select>
  </div>

  @if (errorMsg) {
    <small class="form-text text-danger">{{ errorMsg }}</small>
  }
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-secondary" (click)="cancelar()">Cerrar</button>
  @if (isEditMode()) {
    <button type="button" class="btn btn-outline-warning" (click)="cancelarCita()">Cancelar cita</button>
    <button type="button" class="btn btn-outline-danger" (click)="eliminarCita()">Eliminar cita</button>
  }
  <button type="button" class="btn btn-primary" (click)="guardar()">Guardar</button>
</div>
