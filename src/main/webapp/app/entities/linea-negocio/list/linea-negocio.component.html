<div>
  <h2 id="page-heading" data-cy="LineaNegocioHeading">
    <span>Líneas de Negocio</span>

    <div class="d-flex justify-content-end">
      <button class="btn btn-info me-2" (click)="load()" [disabled]="isLoading">
        <fa-icon icon="sync" [animation]="isLoading ? 'spin' : undefined"></fa-icon>
        Refrescar lista
      </button>
      <button id="jh-create-entity" data-cy="entityCreateButton" class="btn btn-primary" [routerLink]="['/linea-negocio/new']">
        <fa-icon icon="plus"></fa-icon>
        Nueva Línea de Negocio
      </button>
    </div>
  </h2>

  <jhi-alert-error />
  <jhi-alert />

  @if (lineaNegocios().length === 0) {
    <div class="alert alert-warning" id="no-result">
      <span>No se encontraron líneas de negocio.</span>
    </div>
  } @else {
    <div class="table-responsive table-entities" id="entities">
      <table class="table table-striped" aria-describedby="page-heading">
        <thead>
          <tr jhiSort [(sortState)]="sortState" (sortChange)="navigateToWithComponentValues($event)">
            <th scope="col" jhiSortBy="lineaNo">
              <div class="d-flex"><span>Código</span><fa-icon class="p-1" icon="sort"></fa-icon></div>
            </th>
            <th scope="col" jhiSortBy="descripcion">
              <div class="d-flex"><span>Descripción</span><fa-icon class="p-1" icon="sort"></fa-icon></div>
            </th>
            <th scope="col"></th>
          </tr>
        </thead>
        <tbody>
          @for (ln of lineaNegocios(); track trackKey(ln)) {
            <tr data-cy="entityTable">
              <td>
                <strong>{{ ln.lineaNo }}</strong>
              </td>
              <td>{{ ln.descripcion }}</td>
              <td class="text-end">
                <div class="btn-group">
                  <a [routerLink]="['/linea-negocio', ln.noCia, ln.lineaNo, 'view']" class="btn btn-info btn-sm">
                    <fa-icon icon="eye"></fa-icon>
                    <span class="d-none d-md-inline">Vista</span>
                  </a>
                  <a [routerLink]="['/linea-negocio', ln.noCia, ln.lineaNo, 'edit']" class="btn btn-primary btn-sm">
                    <fa-icon icon="pencil-alt"></fa-icon>
                    <span class="d-none d-md-inline">Editar</span>
                  </a>
                  <button type="submit" (click)="delete(ln)" class="btn btn-danger btn-sm">
                    <fa-icon icon="times"></fa-icon>
                    <span class="d-none d-md-inline">Eliminar</span>
                  </button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
