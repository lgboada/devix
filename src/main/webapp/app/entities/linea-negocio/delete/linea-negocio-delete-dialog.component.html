@if (lineaNegocio) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(lineaNegocio.noCia, lineaNegocio.lineaNo)">
    <div class="modal-header">
      <h4 class="modal-title" data-cy="lineaNegocioDeleteDialogHeading">Confirmar eliminación</h4>
    </div>

    <div class="modal-body">
      <jhi-alert-error />
      <p id="jhi-delete-lineaNegocio-heading">
        ¿Seguro que desea eliminar la línea de negocio
        <strong>{{ lineaNegocio.lineaNo }} — {{ lineaNegocio.descripcion }}</strong
        >?
      </p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" (click)="cancel()"><fa-icon icon="ban"></fa-icon>&nbsp;Cancelar</button>
      <button id="jhi-confirm-delete-lineaNegocio" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
        <fa-icon icon="times"></fa-icon>&nbsp;Eliminar
      </button>
    </div>
  </form>
}
