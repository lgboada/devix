<div>
  <h2 id="page-heading" data-cy="CategoriaPacienteHeading">
    <span jhiTranslate="devixApp.categoriaPaciente.home.title">Categorías de Paciente</span>
    <div class="d-flex justify-content-end">
      <button class="btn btn-info me-2" (click)="load()" [disabled]="isLoading">
        <fa-icon icon="sync" [animation]="isLoading ? 'spin' : undefined"></fa-icon>
        <span jhiTranslate="devixApp.categoriaPaciente.home.refreshListLabel">Refrescar lista</span>
      </button>
      <button
        id="jh-create-entity"
        data-cy="entityCreateButton"
        class="btn btn-primary jh-create-entity"
        [routerLink]="['/historia-clinica/categoria-paciente/new']"
      >
        <fa-icon icon="plus"></fa-icon>
        <span jhiTranslate="devixApp.categoriaPaciente.home.createLabel">Nueva Categoría</span>
      </button>
    </div>
  </h2>

  <jhi-alert-error />
  <jhi-alert />

  @if (categoriasPaciente().length === 0) {
    <div class="alert alert-warning" id="no-result">
      <span jhiTranslate="devixApp.categoriaPaciente.home.notFound">Ninguna categoría encontrada</span>
    </div>
  } @else {
    <div class="table-responsive table-entities" id="entities">
      <table class="table table-striped" aria-describedby="page-heading">
        <thead>
          <tr jhiSort [(sortState)]="sortState" (sortChange)="navigateToWithComponentValues($event)">
            <th scope="col" jhiSortBy="id">
              <div class="d-flex">
                <span jhiTranslate="global.field.id">ID</span>
                <fa-icon class="p-1" icon="sort"></fa-icon>
              </div>
            </th>
            <th scope="col" jhiSortBy="noCia">
              <div class="d-flex">
                <span jhiTranslate="devixApp.categoriaPaciente.noCia">No Cia</span>
                <fa-icon class="p-1" icon="sort"></fa-icon>
              </div>
            </th>
            <th scope="col" jhiSortBy="nombre">
              <div class="d-flex">
                <span jhiTranslate="devixApp.categoriaPaciente.nombre">Nombre</span>
                <fa-icon class="p-1" icon="sort"></fa-icon>
              </div>
            </th>
            <th scope="col"></th>
          </tr>
        </thead>
        <tbody>
          @for (cat of categoriasPaciente(); track trackId(cat)) {
            <tr data-cy="entityTable">
              <td>
                <a [routerLink]="['/historia-clinica/categoria-paciente', cat.id, 'view']">{{ cat.id }}</a>
              </td>
              <td>{{ cat.noCia }}</td>
              <td>{{ cat.nombre }}</td>
              <td class="text-end">
                <div class="btn-group">
                  <a
                    [routerLink]="['/historia-clinica/categoria-paciente', cat.id, 'view']"
                    class="btn btn-info btn-sm"
                    data-cy="entityDetailsButton"
                  >
                    <fa-icon icon="eye"></fa-icon>
                    <span class="d-none d-md-inline" jhiTranslate="entity.action.view">Vista</span>
                  </a>
                  <a
                    [routerLink]="['/historia-clinica/categoria-paciente', cat.id, 'edit']"
                    class="btn btn-primary btn-sm"
                    data-cy="entityEditButton"
                  >
                    <fa-icon icon="pencil-alt"></fa-icon>
                    <span class="d-none d-md-inline" jhiTranslate="entity.action.edit">Editar</span>
                  </a>
                  <button type="submit" (click)="delete(cat)" class="btn btn-danger btn-sm" data-cy="entityDeleteButton">
                    <fa-icon icon="times"></fa-icon>
                    <span class="d-none d-md-inline" jhiTranslate="entity.action.delete">Eliminar</span>
                  </button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
  @if (categoriasPaciente().length > 0) {
    <div>
      <div class="d-flex justify-content-center">
        <jhi-item-count [params]="{ page, totalItems, itemsPerPage }" />
      </div>
      <div class="d-flex justify-content-center">
        <ngb-pagination
          [collectionSize]="totalItems"
          [page]="page"
          [pageSize]="itemsPerPage"
          [maxSize]="5"
          [rotate]="true"
          [boundaryLinks]="true"
          (pageChange)="navigateToPage($event)"
        ></ngb-pagination>
      </div>
    </div>
  }
</div>
